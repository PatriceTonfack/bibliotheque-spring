Application · PROPERTIES
# --- Connexion a la base de donnees PostgreSQL (lancee via Docker) ---
spring.datasource.url=jdbc:postgresql://localhost:5433/bibliotheque?sslmode=disable
spring.datasource.username=admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Configuration JPA / Hibernate ---
# ddl-auto=update : Hibernate cree/modifie automatiquement les tables a partir des entites Java.
# Pratique en dev, A NE JAMAIS utiliser en production (on utilise des migrations type Flyway/Liquibase a la place).
spring.jpa.hibernate.ddl-auto=update

# Affiche les requetes SQL generees dans la console : tres utile pour apprendre et debugger
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecte SQL specifique a PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Port de l'application (8080 par defaut, explicite ici) ---
server.port=8080